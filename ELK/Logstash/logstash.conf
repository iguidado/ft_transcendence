input {
	gelf {
		port => 12201
		type => "docker"
	}
}


filter {
	if [tag] == "nginx" {
		grok {
			match => { "message" => "%{COMBINEDAPACHELOG}" }
		}
	}

	if [tag] == "django" {
		grok {
			match => { "message" => "(?<timestamp>%{TIMESTAMP_ISO8601}) \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:message}" }
		}
	}

	if [tag] == "postgres" {
		grok {
			match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{WORD:timezone} \[%{NUMBER:process_id}\] %{WORD:log_level}: %{GREEDYDATA:message}" }
		}
	}
}

output {
	elasticsearch {
		hosts=> "${ELASTIC_HOSTS}"
			index => "docker-logs-%{+YYYY.MM.dd}"
#		user=> "${ELASTIC_USER}"
#		password=> "${ELASTIC_PASSWORD}"
#   cacert=> "certs/ca/ca.crt"
	}
}
