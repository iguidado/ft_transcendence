<div class="container d-flex justify-content-center align-items-center">

  <!-- Carte Bootstrap pour le profil -->
  <div class="card profile-card p-4 text-center">
    <!-- Avatar + bouton param. en haut à droite -->
    <div class="mb-3 position-relative">
      <img 
        id="userAvatar" 
        alt="User avatar" 
        width="150" 
        height="150" 
      />
      <button
      class="btn position-absolute gear-btn" 
      id="openSettings"
      data-bs-toggle="modal" 
      data-bs-target="#settingsModal"
      style=
      "background-image: url('./rsc/param.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      width: 40px;
      height: 40px;
      padding: 0;">
      </button>
    </div>

    <!-- Titre du profil -->
    <h1 class="card-title">
      <span id="usernameDisplay"></span>'s Profile
    </h1>

    <!-- Statistiques -->
    <div class="text-start card-text ms-4 my-3">
      <p>Games played: <span id="gamesPlayed">0</span></p>
      <p>Games won: <span id="gamesWon">0</span></p>
    </div>

    <!-- Bouton de déconnexion -->
    <button id="disconnect" class="btn btn-danger">Disconnect</button>
  </div>
</div>

<!-- Fenêtre modale pour les réglages du profil -->
<div 
  class="modal fade" 
  id="settingsModal" 
  tabindex="-1" 
  aria-labelledby="settingsModalLabel" 
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- En-tête de la modal -->
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="settingsModalLabel">Profile Settings</h1>
        <button 
          type="button" 
          class="btn-close" 
          data-bs-dismiss="modal" 
          aria-label="Close"
        ></button>
      </div>
      <!-- Corps de la modal : champs de réglages -->
      <div class="modal-body">
        <div class="mb-3">
          <label for="newDisplayName" class="form-label">Change username:</label>
          <input 
            type="text" 
            id="newDisplayName" 
            class="form-control" 
            placeholder="Enter new username"
            style="background-color: rgba(255, 186, 106, 0.5)"
          />
        </div>
        <div class="mb-3" id="avatarGalleryContainer">
          <label class="form-label">Select an avatar:</label>
          <div id="avatarGallery" class="d-flex flex-wrap gap-2">
            <!-- La galerie d'avatars sera injectée ici par JS -->
          </div>
        </div>        

        <!-- <div class="mb-3">
          <label for="newAvatarURL" class="form-label">Change avatar URL:</label>
          <input 
            type="text" 
            id="newAvatarURL" 
            class="form-control" 
            placeholder="Enter new avatar URL"
            style="background-color: rgba(255, 186, 106, 0.5)"
          />
        </div> -->
        <div class="form-check mb-3">
          <input 
            class="form-check-input" 
            type="checkbox" 
            id="enable2FA"
            style="background-color: rgba(255, 186, 106, 0.5)"
          />
          <label class="form-check-label" for="enable2FA">Enable 2FA</label>
        </div>
        <!-- Zone d’email pour la 2FA, masquée par défaut -->
        <div id="email2FASection" style="display: none;" class="mb-3">
          <input 
            type="email" 
            id="email2FAInput" 
            class="form-control mb-2"
            placeholder="Enter your email"
            style="background-color: rgba(255, 186, 106, 0.5)"
          />
          <button 
            id="send2FAEmailBtn"
            class="btn btn-primary"
          >
            Send code
          </button>
        </div>
        <!-- Zone de saisie du code 2FA, masquée par défaut -->
        <div id="verify2FAModal" style="display: none;">
          <input 
            type="text" 
            id="code2FAInput" 
            class="form-control mb-2"
            placeholder="Enter code"
            style="background-color: rgba(255, 186, 106, 0.5)"
          />
          <button 
            id="confirm2FABtn"
            class="btn btn-success"
          >
            Confirm
          </button>
        </div>
      </div>
      <!-- Pied de la modal : bouton de sauvegarde -->
      <div class="modal-footer">
        <button 
          id="saveSettings" 
          class="btn btn-primary"
        >
          Save changes
        </button>
      </div>
    </div>
  </div>
</div>
