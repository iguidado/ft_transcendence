<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">

  <!-- Carte Bootstrap pour le profil -->
  <div class="card profile-card p-4 text-center" style="width: 320px;">
    <!-- Avatar + bouton param. en haut à droite -->
    <div class="mb-3 position-relative">
      <img 
        id="userAvatar" 
        class="rounded-circle" 
        src="./rsc/pear.png" 
        alt="User avatar" 
        width="150" 
        height="150" 
      />
      <button
      class="btn btn-sm btn-outline-secondary position-absolute top-0 end-0" 
      id="openSettings"
      data-bs-toggle="modal" 
      data-bs-target="#settingsModal"
      style="background-image: url('./rsc/param.png'); background-size: cover;"
      >
        <!-- Icône roue crantée Bootstrap Icons -->
        <i class="bi bi-gear-fill"></i>
      </button>
    </div>

    <!-- Titre du profil -->
    <h1 class="card-title">
      <span id="usernameDisplay">Pop</span>'s Profile
    </h1>

    <!-- Statistiques -->
    <div class="text-start ms-4 my-3">
      <p>Games played: <span id="gamesPlayed">0</span></p>
      <p>Games won: <span id="gamesWon">0</span></p>
    </div>

    <!-- Bouton de déconnexion -->
    <button id="disconnect" class="btn btn-danger">Disconnect</button>
  </div>
</div>

<!-- Fenêtre modale pour les réglages du profil -->
<div 
  class="modal fade" 
  id="settingsModal" 
  tabindex="-1" 
  aria-labelledby="settingsModalLabel" 
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <!-- En-tête de la modal -->
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="settingsModalLabel">Profile Settings</h1>
        <button 
          type="button" 
          class="btn-close" 
          data-bs-dismiss="modal" 
          aria-label="Close"
        ></button>
      </div>
      <!-- Corps de la modal : champs de réglages -->
      <div class="modal-body">
        <div class="mb-3">
          <label for="newDisplayName" class="form-label">Change username:</label>
          <input 
            type="text" 
            id="newDisplayName" 
            class="form-control" 
            placeholder="Enter new username" 
          />
        </div>
        <div class="mb-3">
          <label for="newAvatarURL" class="form-label">Change avatar URL:</label>
          <input 
            type="text" 
            id="newAvatarURL" 
            class="form-control" 
            placeholder="Enter new avatar URL"
          />
        </div>
        <div class="form-check mb-3">
          <input 
            class="form-check-input" 
            type="checkbox" 
            id="enable2FA"
          />
          <label class="form-check-label" for="enable2FA">Enable 2FA</label>
        </div>
        <!-- Zone d’email pour la 2FA, masquée par défaut -->
        <div id="email2FASection" style="display: none;" class="mb-3">
          <input 
            type="email" 
            id="email2FAInput" 
            class="form-control mb-2"
            placeholder="Enter your email"
          />
          <button 
            id="send2FAEmailBtn"
            class="btn btn-primary"
          >
            Send code
          </button>
        </div>
        <!-- Zone de saisie du code 2FA, masquée par défaut -->
        <div id="verify2FAModal" style="display: none;">
          <input 
            type="text" 
            id="code2FAInput" 
            class="form-control mb-2"
            placeholder="Enter code"
          />
          <button 
            id="confirm2FABtn"
            class="btn btn-success"
          >
            Confirm
          </button>
        </div>
      </div>
      <!-- Pied de la modal : bouton de sauvegarde -->
      <div class="modal-footer">
        <button 
          id="saveSettings" 
          class="btn btn-primary"
        >
          Save changes
        </button>
      </div>
    </div>
  </div>
</div>



<div class="profile-frame">
  <div class="profile">
    <div class="profile__avatar-container">
      <img id="userAvatar" class="profile__avatar" src="./rsc/pear.png" alt="User avatar" />
      <button class="profile__settings-btn" id="openSettings"></button>
    </div>
    <h1 class="profile__title"><span id="usernameDisplay"></span>'s Profile</h1>


    <div class="profile__stats">
      <p>Games played: <span id="gamesPlayed">0</span></p>
      <p>Games won: <span id="gamesWon">0</span></p>
    </div>

    <div class="profile__settings-modal" id="settingsModal" style="display: none;">
      <div class="profile__settings-field">
        <label for="newDisplayName">Change username:</label>
        <input type="text" id="newDisplayName" class="profile__input" />
      </div>
      <div class="profile__settings-field">
        <label for="newAvatarURL">Change avatar URL:</label>
        <input type="text" id="newAvatarURL" class="profile__input" />
      </div>
      <div class="profile__settings-field">
        <label>
          <input type="checkbox" id="enable2FA" />
          Enable 2FA
        </label>
        <div id="email2FASection" style="display: none;">
          <input type="email" id="email2FAInput" placeholder="Enter your email" />
          <button id="send2FAEmailBtn">Send code</button>
        </div>
        <div id="verify2FAModal" style="display: none;">
          <input type="text" id="code2FAInput" placeholder="Enter code" />
          <button id="confirm2FABtn">Confirm</button>
        </div>
      </div>
      <button id="saveSettings" class="profile__button">Save changes</button>
    </div>
	<button id="disconnect">Disconnect</button>
  </div>
</div>
