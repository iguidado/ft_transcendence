<div id="loginSection">
	<form class="form-container" id="loginForm">
		<div class="form-container__title">Connect to play !</div>
		<div class="btn position-absolute" id="backBtn" style="
			top: 0;
			left: 0;
			background-image: url('/rsc/arrow.png');
			background-size: contain;
			background-repeat: no-repeat;
			background-position: center;
			width: 40px;
			height: 40px;
			padding: 0;
			display: none;">
		</div>
		<div class="form-container__field">
			<label class="form-container__label" for="loginInput">Login</label>
			<input class="form-container__input" type="text" id="loginInput" placeholder="Enter your login" />
		</div>
		<div class="form-container__field">
			<label class="form-container__label" for="passwordInput">Password</label>
			<input class="form-container__input" type="password" id="passwordInput" placeholder="Enter your password" />
		</div>
		<button class="form-container__button" type="submit" id="connectButton">Connect</button>
		<button class="form-container__button" type="button" id="registerButton">Register</button>
	</form>
</div>



<div id="registerSection" style="display: none;">
	<form class="form-container" id="registerForm">
		<div class="form-container__title">Create your account !</div>
		<div class="form-container__field">
			<label class="form-container__label" for="loginInputRegister">Login</label>
			<input class="form-container__input" type="text" id="loginInputRegister" placeholder="Choose your login" />
		</div>
		<div class="form-container__field">
			<label class="form-container__label" for="passwordInputRegister">Password</label>
			<input class="form-container__input" type="password" id="passwordInputRegister"
				placeholder="Choose your password" />
		</div>
		<div class="form-container__field">
			<label class="form-container__label" for="confirmPasswordInput">Confirm Password</label>
			<input class="form-container__input" type="password" id="confirmPasswordInput"
				placeholder="Confirm your password" />
		</div>
		<button class="form-container__button" type="submit">Create account</button>
		<button class="form-container__button" type="button" id="backToLoginButton">Back to login</button>
	</form>
</div>


<div class="modal fade" id="2FALoginModal" tabindex="-1" aria-labelledby="2FAModalLabel">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<!-- En-tête de la modal -->
			<div class="modal-header">
				<h1 class="modal-title fs-5" id="2FAModalLabel">2FA</h1>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<!-- Corps de la modal : champs de réglages -->
			<div class="modal-body">
				<div class="mb-3">
					<label for="code2FAInputLogin" class="form-label">Code:</label>
					<input type="text" id="code2FAInputLogin" class="form-control" placeholder="Enter 2FA code"
						style="background-color: rgba(255, 186, 106, 0.5)" />
				</div>
			</div>

			<!-- Pied de la modal : bouton de sauvegarde -->
			<div class="modal-footer">
				<button id="validate2FAFromLogin" class="btn btn-primary">Validate</button>
				<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
			</div>
		</div>
	</div>
</div>
