<div id="tournament__container" class="container-fluid d-flex flex-column justify-content-start align-items-center">
	<h2 class="form-container__title text-center">Tournament</h2>
	<div class="card mt-4 semi-transparent-card" style="width: 50%">
		<div class="card-body">
			<div style="max-height: 300px; overflow-y: auto;">
				<ul id="tournament__playerlist" class="list-group mb-3">
				</ul>
			</div>
			<div class="d-flex justify-content-center">
				<button id="tournament__addplayerbtn" class="btn btn-primary mx-2">Add Player</button>
				<button id="tournament__startbtn" class="btn btn-success mx-2">Start !</button>
			</div>
		</div>
	</div>
</div>

<div class="modal fade" id="TDNsettingsModal" tabindex="-1" aria-labelledby="TDNsettingsModalLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="TDNsettingsModalLabel">Edit Display Name</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<div class="mb-3">
					<label for="newTDN" class="form-label">New Display Name:</label>
					<input type="text" id="newTDN" class="form-control" placeholder="Enter new display name"
						style="background-color: rgba(255, 186, 106, 0.5);" />
				</div>
			</div>
			<div class="modal-footer">
				<button id="saveTDNSettings" class="btn btn-primary">Save</button>
			</div>
		</div>
	</div>
</div>
