server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }

    # proxy the PHP scripts to Apache listening on 127.0.0.1:80
    #
    #location ~ \.php$ {
    #    proxy_pass   http://127.0.0.1;
    #}

    # pass the api call to django backend at backend:8000
    
    location /api/ {
        proxy_pass   http://backend:8000;
	proxy_set_header Host $host; #Pass original hostname
	proxy_set_header X-Real-IP $remote_addr; #Pass actual ip adress
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # Security headers
    #	add_header Strict-Transport-Security "max-age=63072000" always;
    #	add_header X-Content-Type-Options nosniff;
    #	add_header X-Frame-Options "SAMEORIGIN";
    #	add_header X-XSS-Protection "1; mode=block"; #Block Xss attack

    # deny access to .htaccess files, if Apache's document root
    # concurs with nginx's one
    #
    #location ~ /\.ht {
    #    deny  all;
    #}
}

