
services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/src:/usr/share/nginx/html  # Bind mount for development
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf  # Nginx configuration
        #depends_on:
        #  - backend
        #
    
# Backend service
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    environment:
        #     - DEBUG=1
        #     - DJANGO_SETTINGS_MODULE=project.settings.development
      - DB_HOST=db
      - DB_NAME=pongdb
      - DB_USER=ponguser
      - DB_PASSWORD=pongpass
        #- JWT_SECRET_KEY=your-secret-key-here
        #volumes:
        #  - ./backend:/app  # Mount backend code

